<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>ModLoader Download</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Karta */
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
            animation: fadeIn 1s ease;
        }

        /* Tytuł */
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        /* Przycisk */
        .btn {
            display: inline-block;
            padding: 18px 40px;
            border-radius: 15px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: 0.25s;
            box-shadow: 0 0 20px rgba(34,197,94,0.5);
        }

        .btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px rgba(34,197,94,0.9);
        }

        /* Animacja wejścia */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glow tło */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(34,197,94,0.2), transparent);
            top: -200px;
            right: -200px;
            filter: blur(100px);
        }
    </style>
</head>

<body>

    <div class="glow"></div>

    <div class="card">
        <h1>ModLoader</h1>
        <p>⬇Dowload⬇</p>

        <a class="btn" href="Loader.exe" download>
            Dowload Loader.exe
        </a>
    </div>

</body>
</html>
